name: ci

# Every push / PR runs the full check + test + lint matrix. This is
# the contract the release workflow relies on — if `ci` is green on a
# tagged commit, the release workflow's typecheck/test gate is a
# rerun (intentional belt-and-suspenders).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - run: bun install --frozen-lockfile

      - name: Workspace typecheck
        run: bun run check

      - name: Workspace tests
        run: bun run test

      # Lint is informative for now (the 0.0.x baseline has many
      # pre-existing warnings; the M6.1 scope refactor is in progress).
      # When the baseline is clean, drop `continue-on-error`.
      - name: Lint
        run: bun run lint
        continue-on-error: true

  examples-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - run: bun install --frozen-lockfile

      - name: Full-stack example typecheck
        run: bun run --cwd examples/full-stack check
