name: release

# Tag-triggered publish of every @konfig.ts/* package to npm with
# `--provenance`. The tag is the source of truth: the workflow refuses
# to publish if any package's version drifts from the tag name.
#
# Required configuration:
#   - id-token: write — for OIDC trusted publishing + provenance.
#   - A Trusted Publisher configured on EACH @konfig.ts/* package on npmjs.com
#     (GitHub Actions → this repo → workflow filename "release.yml"). No token.
#   - Branch protection on main blocking force-push.

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  publish:
    name: publish @konfig.ts/* to npm
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout tagged source
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          # The tag IS the published artifact's content reference.
          # Force the checkout to be the tag, not a moving branch.
          ref: ${{ github.ref }}

      - name: Verify tag → version match
        run: |
          TAG="${GITHUB_REF##*/}"
          TAG_VERSION="${TAG#v}"
          echo "Tag → ${TAG} → version ${TAG_VERSION}"
          for pkg in packages/*/package.json; do
            IS_PRIVATE=$(node -e "console.log(require('./'+process.argv[1]).private === true)" "$pkg")
            if [ "$IS_PRIVATE" = "true" ]; then
              echo "skip (private, not published): $pkg"
              continue
            fi
            PKG_VERSION=$(node -e "console.log(require('./'+process.argv[1]).version)" "$pkg")
            if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
              echo "::error file=$pkg::version $PKG_VERSION does not match tag $TAG_VERSION"
              exit 1
            fi
          done

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Setup Node (trusted publishing needs Node >= 22.14)
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Ensure npm >= 11.5.1 (OIDC trusted publishing)
        run: npm install -g npm@latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run check

      - name: Test
        run: bun run test

      - name: Build packages
        run: bun run build

      - name: Bundle the built dist for the verify job
        run: tar -czf built-dist.tar.gz packages/*/dist

      - name: Upload built dist
        uses: actions/upload-artifact@v7
        with:
          name: built-dist
          path: built-dist.tar.gz
          retention-days: 7

      - name: "Rewrite workspace:* and catalog: protocol deps to concrete versions"
        run: node scripts/rewrite-workspace-deps.cjs

      - name: Verify published-artifact contents (dry-run pack)
        run: |
          for dir in packages/core packages/env packages/k8s packages/external-secrets packages/sealed-secrets packages/sops packages/argocd packages/docker packages/cli; do
            echo "::group::npm pack --dry-run $dir"
            (cd "$dir" && npm pack --dry-run --json) | tee "/tmp/pack-$(basename "$dir").json"
            echo "::endgroup::"
          done

      - name: Publish in dependency order (OIDC trusted publishing)
        run: |
          set -euo pipefail
          # Core has no @konfig.ts/* deps; everything else depends on
          # core. Publish leaves first so downstream package's installs
          # can resolve the freshly-published versions.
          # No NODE_AUTH_TOKEN: npm authenticates via this workflow's OIDC
          # identity and attaches provenance automatically (no --provenance).
          for pkg in core env k8s external-secrets sealed-secrets sops argocd docker cli; do
            echo "::group::publish @konfig.ts/${pkg}"
            (cd "packages/${pkg}" && npm publish --access public)
            echo "::endgroup::"
          done

      - name: Tag attestations (SLSA provenance)
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            packages/*/dist/**/*

  verify-reproducible:
    name: verify published tarballs match the built dist
    needs: publish
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Download the dist built by the publish job
        uses: actions/download-artifact@v8
        with:
          name: built-dist

      - name: Unpack the built dist
        run: tar -xzf built-dist.tar.gz

      - name: Fetch published tarballs and diff against the built dist
        run: |
          set -euo pipefail
          TAG_VERSION="${GITHUB_REF##*/v}"
          for pkg in core env k8s external-secrets sealed-secrets sops argocd docker cli; do
            echo "::group::verify @konfig.ts/${pkg}@${TAG_VERSION}"
            mkdir -p "/tmp/verify-${pkg}"
            npm pack "@konfig.ts/${pkg}@${TAG_VERSION}" --pack-destination "/tmp/verify-${pkg}/"
            tar -xzf "/tmp/verify-${pkg}/"*.tgz -C "/tmp/verify-${pkg}/"
            # The published dist must byte-match the dist the publish job built
            # (npm packs dist/ verbatim). A difference means the tarball on the
            # registry was substituted or altered after the build.
            diff -r "/tmp/verify-${pkg}/package/dist" "packages/${pkg}/dist" \
              && echo "OK — @konfig.ts/${pkg}@${TAG_VERSION} matches the built dist" \
              || (echo "::error::@konfig.ts/${pkg}@${TAG_VERSION} does NOT match the dist built in the publish job" && exit 1)
            echo "::endgroup::"
          done
